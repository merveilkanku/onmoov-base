<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="onmoovGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0668E1" />
      <stop offset="100%" stop-color="#00D2FF" />
    </linearGradient>
    <linearGradient id="onmoovGrad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0668E1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Geometric 'O' and 'M' combined into a forward-moving tech shape -->
  <g transform="translate(256, 256) scale(0.9) translate(-256, -256)">
    <!-- Left Hexagon / O -->
    <path d="M 160 120 L 260 178 L 260 294 L 160 352 L 60 294 L 60 178 Z" 
          fill="none" stroke="url(#onmoovGrad1)" stroke-width="44" stroke-linejoin="round" filter="url(#shadow)" />
    
    <!-- Right overlapping shape / M -->
    <path d="M 260 178 L 360 120 L 460 178 L 460 294 L 360 352 L 260 294" 
          fill="none" stroke="url(#onmoovGrad2)" stroke-width="44" stroke-linejoin="round" stroke-linecap="round" />
          
    <!-- Center connecting line for depth -->
    <path d="M 160 236 L 260 294 L 360 236" 
          fill="none" stroke="url(#onmoovGrad1)" stroke-width="44" stroke-linejoin="round" stroke-linecap="round" />
          
    <!-- Forward arrow accent -->
    <path d="M 360 236 L 460 294" 
          fill="none" stroke="#00D2FF" stroke-width="44" stroke-linecap="round" />
  </g>
</svg>
